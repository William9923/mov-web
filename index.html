<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(ﾉ◕ヮ◕)ﾉ mov-web</title>
  <meta name="description" content="Search and stream movies and TV shows · Lightweight · No sign-up required.">

  <!-- Pico CSS (classless, CDN) -->
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"></noscript>

  <!-- Dynamic Favicon -->
  <script>
    const canvas = document.createElement('canvas')
    canvas.width = 64
    canvas.height = 64
    const ctx = canvas.getContext('2d')
    ctx.font = '44px serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('ﾉ◕', 32, 32)
    const link = document.createElement('link')
    link.rel = 'icon'
    link.href = canvas.toDataURL()
    document.head.appendChild(link)
  </script>

  <style>
    :root {
      --accent: #e50914;
      --accent-hover: #cc0000;
      --accent-light: rgba(229,9,20,0.15);
      --pico-font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    body > main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      padding-top: 1rem;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    body > main {
      padding-top: 2.5rem;
    }

    /* ── Search form ── */
    #search-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    #search-form input[type="search"] {
      flex: 1;
      min-width: 180px;
      margin-bottom: 0;
    }

    #search-form input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    #search-btn {
      width: auto;
      margin-bottom: 0;
      font-weight: 600;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
    }

    #search-btn:hover:not([disabled]) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(229,9,20,0.25);
    }

    /* ── Filter Toggle ── */
    .filter-section {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.25rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      gap: 0.35rem;
    }

    .filter-btn {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--pico-form-element-border-color);
      background: var(--pico-form-element-background-color);
      color: var(--pico-form-element-color);
      cursor: pointer;
      border-radius: 0.25rem;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: var(--pico-card-background-color);
    }

    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ── Results Grid ── */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .result-card {
      cursor: pointer;
      border-radius: 0.5rem;
      overflow: hidden;
      transition: all 0.2s ease;
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-card-border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .result-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: var(--pico-form-element-background-color);
    }

    .card-info {
      padding: 0.75rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin: 0 0 0.35rem 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .card-meta {
      font-size: 0.75rem;
      opacity: 0.7;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 0.2rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.movie {
      background: rgba(30, 144, 255, 0.2);
      color: #1e90ff;
    }

    .badge.tv {
      background: rgba(255, 140, 0, 0.2);
      color: #ff8c00;
    }

    /* ── Watched Indicator ── */
    .result-card {
      position: relative;
    }

    .watched-ribbon {
      position: absolute;
      top: 0;
      left: 0;
      background: rgba(16, 185, 129, 0.92); /* emerald green */
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 0.5rem 0 0.4rem 0;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      line-height: 1.4;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Loading State ── */
    #loading {
      display: none;
      text-align: center;
      padding: 2rem;
      opacity: 0.7;
    }

    #loading.active {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 1.5rem;
      height: 1.5rem;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Empty State ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      opacity: 0.6;
    }

    #empty-state.active {
      display: block;
    }

    #empty-state p {
      margin: 0;
      font-size: 1rem;
    }

    /* ── Responsive Design ── */
    @media (max-width: 768px) {
      body > main {
        padding: 1rem;
        padding-top: 0.75rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      #results {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 0.75rem;
      }

      .card-info {
        padding: 0.5rem;
      }

      .card-title {
        font-size: 0.8rem;
      }

      .card-meta {
        font-size: 0.7rem;
      }
    }

    @media (max-width: 480px) {
      body > main {
        padding: 0.75rem;
      }

      h1 {
        font-size: 1.25rem;
      }

      #results {
        grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      }
    }

    /* ── Footer ── */
    .site-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1rem;
      font-size: 0.8rem;
      opacity: 0.55;
      transition: opacity 0.2s;
    }

    .site-footer:hover {
      opacity: 1;
    }

    .site-footer a {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--pico-primary, #1e90ff);
      text-decoration: none;
      font-weight: 600;
    }

    .site-footer a:hover {
      text-decoration: underline;
    }

    .site-footer svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .footer-dot {
      opacity: 0.4;
    }
  </style>
</head>

<body>
  <main>
    <h1>(ﾉ◕ヮ◕)ﾉ mov-web</h1>
    <p><small>Search movies to watch</small></p>

    <!-- Search Form -->
    <form id="search-form">
      <input
        type="search"
        id="search-input"
        placeholder="Search movies, TV shows..."
        autocomplete="off"
        autofocus
      >
      <button id="search-btn" type="submit">Search</button>
    </form>

    <!-- Filter Toggles -->
    <section class="filter-section">
      <div class="filter-group">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="movie">Movies</button>
        <button class="filter-btn" data-type="tv">TV Shows</button>
      </div>
    </section>

    <!-- Loading Spinner -->
    <div id="loading">
      <span class="spinner"></span>Searching...
    </div>

    <!-- Results Grid -->
    <section id="results"></section>

    <!-- Empty State -->
    <div id="empty-state"></div>
  </main>

  <script>
    // ========== STATE & CONFIG ==========
    const CONFIG = {
      MIN_QUERY_LENGTH: 2
    };

    const STATE = {
      currentQuery: '',
      selectedType: 'all',
      results: []
    };

    // ========== DOM ELEMENTS ==========
    const DOM = {
      searchForm: document.getElementById('search-form'),
      searchInput: document.getElementById('search-input'),
      searchBtn: document.getElementById('search-btn'),
      filterBtns: document.querySelectorAll('.filter-btn'),
      results: document.getElementById('results'),
      loading: document.getElementById('loading'),
      emptyState: document.getElementById('empty-state')
    };

    // ========== WATCH HISTORY ==========
    function getWatchedState(id, type, numericId) {
      try {
        if (type === 'movie') {
          // Movie is "watched" if it appears in history
          const history = JSON.parse(localStorage.getItem('mov-web-history') || '[]');
          const inHistory = history.some(item => item.id === id);
          return inHistory ? { watched: true, label: '✓ Watched' } : null;
        } else {
          // TV: count watched episodes from watched-episodes store
          const watched = JSON.parse(localStorage.getItem('mov-web-watched-episodes') || '{}');
          const eps = watched[numericId];
          if (eps && eps.length > 0) {
            return { watched: true, label: `✓ ${eps.length} ep` };
          }
          return null;
        }
      } catch (e) {
        return null;
      }
    }

    function saveToHistory(id, type, title, image) {
      try {
        const history = JSON.parse(localStorage.getItem('mov-web-history') || '[]');
        const newItem = { id, type, title, image, timestamp: Date.now() };
        const filtered = history.filter(item => item.id !== id);
        const updated = [newItem, ...filtered].slice(0, 10);
        localStorage.setItem('mov-web-history', JSON.stringify(updated));
      } catch (e) {
        console.error('Error saving to history:', e);
      }
    }

    // ========== API CALLS ==========
    async function searchMovies(query) {
      if (query.trim().length < CONFIG.MIN_QUERY_LENGTH) {
        clearResults();
        return;
      }

      STATE.currentQuery = query.trim();
      showLoading(true);
      DOM.emptyState.classList.remove('active');

      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        if (!response.ok) throw new Error(`API error: ${response.status}`);
        const data = await response.json();
        STATE.results = data || [];
        displayResults(filterResults(STATE.results));
      } catch (error) {
        console.error('Search error:', error);
        showError('Failed to search. Please try again.');
      } finally {
        showLoading(false);
      }
    }

    // ========== FILTERING & DISPLAY ==========
    function filterResults(items) {
      if (STATE.selectedType === 'all') return items;
      return items.filter(item => item.type === STATE.selectedType);
    }

    function displayResults(items) {
      DOM.results.innerHTML = '';

      if (items.length === 0) {
        DOM.emptyState.innerHTML = '<p>No results found</p>';
        DOM.emptyState.classList.add('active');
        return;
      }

      items.forEach(item => {
        DOM.results.appendChild(createResultCard(item));
      });
    }

    function createResultCard(item) {
      const div = document.createElement('div');
      div.className = 'result-card';
      div.onclick = () => openWatch(item.id, item.type, item.title, item.image);

      const img = document.createElement('img');
      img.src = item.image;
      img.alt = item.title;
      img.loading = 'lazy';
      div.appendChild(img);

      // Watched ribbon — overlaid on top of poster
      const numericId = item.numericId || (item.id.match(/(\d+)$/) || [])[1];
      const watchedState = getWatchedState(item.id, item.type, numericId);
      if (watchedState) {
        const ribbon = document.createElement('div');
        ribbon.className = 'watched-ribbon';
        ribbon.textContent = watchedState.label;
        div.appendChild(ribbon);
      }

      const info = document.createElement('div');
      info.className = 'card-info';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = item.title;

      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const year = document.createElement('span');
      year.textContent = item.year || '—';

      const badge = document.createElement('span');
      badge.className = `badge ${item.type}`;
      badge.textContent = item.type === 'movie' ? 'Movie' : 'TV';

      meta.appendChild(year);
      meta.appendChild(badge);
      info.appendChild(title);
      info.appendChild(meta);
      div.appendChild(info);

      return div;
    }

    function clearResults() {
      DOM.results.innerHTML = '';
      STATE.results = [];
    }

    function showLoading(show) {
      DOM.loading.classList.toggle('active', show);
    }

    function showError(message) {
      DOM.emptyState.innerHTML = `<p>${message}</p>`;
      DOM.emptyState.classList.add('active');
    }

    // ========== NAVIGATION ==========
    function openWatch(id, type, title, image) {
      saveToHistory(id, type, title, image);
      const params = new URLSearchParams({ id, type, title });
      window.location.href = `/watch.html?${params.toString()}`;
    }

    // ========== EVENT LISTENERS ==========
    function setupEventListeners() {
      DOM.searchForm.addEventListener('submit', (e) => {
        e.preventDefault();
        searchMovies(DOM.searchInput.value);
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          DOM.searchInput.value = '';
          clearResults();
          STATE.currentQuery = '';
        }
      });

      DOM.filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          DOM.filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          STATE.selectedType = btn.dataset.type;
          if (STATE.results.length > 0) displayResults(filterResults(STATE.results));
        });
      });
    }

    // ========== INITIALIZATION ==========
    function init() {
      setupEventListeners();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>
