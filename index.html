<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎬 mov-web - Search</title>
  <meta name="description" content="Search and stream movies and TV shows · Lightweight · No sign-up required.">

  <!-- Pico CSS (classless, CDN) -->
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"></noscript>

  <!-- Font Awesome (CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Dynamic Favicon -->
  <script>
    const canvas = document.createElement('canvas')
    canvas.width = 64
    canvas.height = 64
    const ctx = canvas.getContext('2d')
    ctx.font = '48px serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('🎬', 32, 32)
    const link = document.createElement('link')
    link.rel = 'icon'
    link.href = canvas.toDataURL()
    document.head.appendChild(link)
  </script>

  <style>
    :root {
      --accent: #e50914;
      --accent-hover: #cc0000;
      --accent-light: #fff0f0;
      --pico-font-size: 16px;
    }

    html[data-theme="dark"] {
      --accent-light: #2a0000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    body > main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      padding-top: 1rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-left {
      flex: 1;
      min-width: 0;
    }

    h1 {
      margin: 0 0 0.25rem 0;
      font-size: 2rem;
    }

    .subtitle {
      opacity: 0.7;
      margin: 0;
      font-size: 0.95rem;
    }

    .header-right {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    #theme-toggle {
      background: none;
      border: 1px solid var(--pico-form-element-border-color);
      width: 2.5rem;
      height: 2.5rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 0.25rem;
      transition: all 0.2s;
    }

    #theme-toggle:hover {
      background: var(--pico-form-element-background-color);
    }

    /* ── Search Section ── */
    .search-section {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    #search-input {
      flex: 1;
      min-width: 0;
    }

    #search-btn {
      flex: 0 0 auto;
      width: 2.75rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Filter Toggle ── */
    .filter-section {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      gap: 0.35rem;
    }

    .filter-btn {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--pico-form-element-border-color);
      background: var(--pico-form-element-background-color);
      color: var(--pico-form-element-color);
      cursor: pointer;
      border-radius: 0.25rem;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      background: var(--pico-card-background-color);
    }

    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ── Results Grid ── */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .result-card {
      cursor: pointer;
      border-radius: 0.5rem;
      overflow: hidden;
      transition: all 0.2s ease;
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-card-border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .result-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: var(--pico-form-element-background-color);
    }

    .card-info {
      padding: 0.75rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin: 0 0 0.35rem 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .card-meta {
      font-size: 0.75rem;
      opacity: 0.7;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
    }

    .badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 0.2rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.movie {
      background: rgba(30, 144, 255, 0.2);
      color: #1e90ff;
    }

    .badge.tv {
      background: rgba(255, 140, 0, 0.2);
      color: #ff8c00;
    }

    /* ── Loading State ── */
    #loading {
      display: none;
      text-align: center;
      padding: 2rem;
      opacity: 0.7;
    }

    #loading.active {
      display: block;
    }

    .spinner {
      font-size: 1.5rem;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Empty State ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      opacity: 0.6;
    }

    #empty-state.active {
      display: block;
    }

    #empty-state p {
      margin: 0;
      font-size: 1rem;
    }

    /* ── Recently Watched ── */
    .recently-watched-section {
      display: none;
      margin-bottom: 2rem;
    }

    .recently-watched-section.active {
      display: block;
    }

    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0.8;
      margin: 0 0 0.75rem 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #recently-watched {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.75rem;
    }

    .recent-item {
      cursor: pointer;
      border-radius: 0.35rem;
      overflow: hidden;
      transition: all 0.2s;
      border: 1px solid var(--pico-card-border-color);
    }

    .recent-item:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    }

    .recent-item img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      opacity: 0.6;
      font-size: 0.85rem;
    }

    /* ── Responsive Design ── */
    @media (max-width: 768px) {
      body > main {
        padding: 1rem;
        padding-top: 0.75rem;
      }

      header {
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.85rem;
      }

      .search-section {
        margin-bottom: 1rem;
      }

      .filter-section {
        margin-bottom: 1rem;
      }

      #results {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 0.75rem;
      }

      .card-info {
        padding: 0.5rem;
      }

      .card-title {
        font-size: 0.8rem;
      }

      .card-meta {
        font-size: 0.7rem;
      }

      #recently-watched {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.5rem;
      }
    }

    @media (max-width: 480px) {
      body > main {
        padding: 0.75rem;
      }

      h1 {
        font-size: 1.25rem;
      }

      #results {
        grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      }

      #recently-watched {
        grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      }
    }
  </style>
</head>

<body>
  <main>
    <!-- Header -->
    <header>
      <div class="header-left">
        <h1>🎬 mov-web</h1>
        <p class="subtitle">Search movies & TV shows · Stream instantly · No sign-up</p>
      </div>
      <div class="header-right">
        <button id="theme-toggle" aria-label="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <input 
        type="text" 
        id="search-input" 
        placeholder="Search movies, TV shows..."
        autocomplete="off"
        spellcheck="false"
      >
      <button id="search-btn" aria-label="Search">
        <i class="fas fa-search"></i>
      </button>
    </section>

    <!-- Filter Toggles -->
    <section class="filter-section">
      <div class="filter-group">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="movie">Movies</button>
        <button class="filter-btn" data-type="tv">TV Shows</button>
      </div>
    </section>

    <!-- Recently Watched -->
    <section id="recently-watched-section" class="recently-watched-section">
      <h3 class="section-title">Recently Watched</h3>
      <div id="recently-watched"></div>
    </section>

    <!-- Loading Spinner -->
    <div id="loading" class="loading">
      <div class="spinner">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
      <p>Searching...</p>
    </div>

    <!-- Results Grid -->
    <section id="results"></section>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state">
      <p>
        <i class="fas fa-search"></i> Start typing to search for movies and TV shows
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>🎬 mov-web © 2024 · Stream movies and TV shows instantly</p>
  </footer>

  <script>
    // ========== STATE & CONFIG ==========
    const CONFIG = {
      DEBOUNCE_DELAY: 300,
      MIN_QUERY_LENGTH: 2
    };

    const STATE = {
      currentQuery: '',
      selectedType: 'all',
      results: [],
      debounceTimer: null
    };

    // ========== DOM ELEMENTS ==========
    const DOM = {
      searchInput: document.getElementById('search-input'),
      searchBtn: document.getElementById('search-btn'),
      filterBtns: document.querySelectorAll('.filter-btn'),
      results: document.getElementById('results'),
      loading: document.getElementById('loading'),
      emptyState: document.getElementById('empty-state'),
      themeToggle: document.getElementById('theme-toggle'),
      recentlyWatchedSection: document.getElementById('recently-watched-section'),
      recentlyWatchedContainer: document.getElementById('recently-watched'),
      html: document.documentElement
    };

    // ========== THEME MANAGEMENT ==========
    function initTheme() {
      const savedTheme = localStorage.getItem('mov-web-theme') || 'light';
      DOM.html.setAttribute('data-theme', savedTheme);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const theme = DOM.html.getAttribute('data-theme');
      const icon = theme === 'dark' ? 'fa-sun' : 'fa-moon';
      DOM.themeToggle.innerHTML = `<i class="fas ${icon}"></i>`;
    }

    function toggleTheme() {
      const currentTheme = DOM.html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      DOM.html.setAttribute('data-theme', newTheme);
      localStorage.setItem('mov-web-theme', newTheme);
      updateThemeIcon();
    }

    // ========== WATCH HISTORY ==========
    function saveToHistory(id, type, title, image) {
      try {
        const history = JSON.parse(localStorage.getItem('mov-web-history') || '[]');
        const newItem = { id, type, title, image, timestamp: Date.now() };
        
        // Remove duplicate
        const filtered = history.filter(item => item.id !== id);
        
        // Keep only 10 most recent
        const updated = [newItem, ...filtered].slice(0, 10);
        localStorage.setItem('mov-web-history', JSON.stringify(updated));
      } catch (e) {
        console.error('Error saving to history:', e);
      }
    }

    function loadRecentlyWatched() {
      try {
        const history = JSON.parse(localStorage.getItem('mov-web-history') || '[]');
        if (history.length === 0) {
          DOM.recentlyWatchedSection.classList.remove('active');
          return;
        }

        DOM.recentlyWatchedContainer.innerHTML = '';
        history.forEach(item => {
          const el = createRecentItem(item);
          DOM.recentlyWatchedContainer.appendChild(el);
        });
        DOM.recentlyWatchedSection.classList.add('active');
      } catch (e) {
        console.error('Error loading history:', e);
      }
    }

    function createRecentItem(item) {
      const div = document.createElement('div');
      div.className = 'recent-item';
      div.title = item.title;
      div.onclick = () => openWatch(item.id, item.type, item.title);
      
      const img = document.createElement('img');
      img.src = item.image;
      img.alt = item.title;
      img.loading = 'lazy';
      
      div.appendChild(img);
      return div;
    }

    // ========== API CALLS ==========
    async function searchMovies(query) {
      if (query.trim().length < CONFIG.MIN_QUERY_LENGTH) {
        clearResults();
        DOM.emptyState.classList.add('active');
        return;
      }

      STATE.currentQuery = query.trim();
      showLoading(true);
      DOM.emptyState.classList.remove('active');

      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        
        if (!response.ok) {
          throw new Error(`API error: ${response.status}`);
        }

        const data = await response.json();
        STATE.results = data || [];
        
        // Apply filter and display
        displayResults(filterResults(STATE.results));
      } catch (error) {
        console.error('Search error:', error);
        showError('Failed to search. Please try again.');
      } finally {
        showLoading(false);
      }
    }

    // ========== FILTERING & DISPLAY ==========
    function filterResults(items) {
      if (STATE.selectedType === 'all') {
        return items;
      }
      return items.filter(item => item.type === STATE.selectedType);
    }

    function displayResults(items) {
      DOM.results.innerHTML = '';

      if (items.length === 0) {
        DOM.emptyState.innerHTML = '<p><i class="fas fa-inbox"></i> No results found</p>';
        DOM.emptyState.classList.add('active');
        return;
      }

      items.forEach(item => {
        const card = createResultCard(item);
        DOM.results.appendChild(card);
      });
    }

    function createResultCard(item) {
      const div = document.createElement('div');
      div.className = 'result-card';
      div.onclick = () => openWatch(item.id, item.type, item.title, item.image);

      const img = document.createElement('img');
      img.src = item.image;
      img.alt = item.title;
      img.loading = 'lazy';

      const info = document.createElement('div');
      info.className = 'card-info';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = item.title;

      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const year = document.createElement('span');
      year.textContent = item.year || '—';

      const badge = document.createElement('span');
      badge.className = `badge ${item.type}`;
      badge.textContent = item.type === 'movie' ? 'Movie' : 'TV';

      meta.appendChild(year);
      meta.appendChild(badge);

      info.appendChild(title);
      info.appendChild(meta);

      div.appendChild(img);
      div.appendChild(info);

      return div;
    }

    function clearResults() {
      DOM.results.innerHTML = '';
      STATE.results = [];
      DOM.emptyState.classList.add('active');
    }

    function showLoading(show) {
      if (show) {
        DOM.loading.classList.add('active');
      } else {
        DOM.loading.classList.remove('active');
      }
    }

    function showError(message) {
      DOM.emptyState.innerHTML = `<p><i class="fas fa-exclamation-circle"></i> ${message}</p>`;
      DOM.emptyState.classList.add('active');
    }

    // ========== NAVIGATION ==========
    function openWatch(id, type, title, image) {
      saveToHistory(id, type, title, image);
      const params = new URLSearchParams({
        id,
        type,
        title
      });
      window.location.href = `/watch.html?${params.toString()}`;
    }

    // ========== EVENT LISTENERS ==========
    function setupEventListeners() {
      // Search input with debounce
      DOM.searchInput.addEventListener('input', (e) => {
        clearTimeout(STATE.debounceTimer);
        STATE.debounceTimer = setTimeout(() => {
          searchMovies(e.target.value);
        }, CONFIG.DEBOUNCE_DELAY);
      });

      // Search button
      DOM.searchBtn.addEventListener('click', () => {
        clearTimeout(STATE.debounceTimer);
        searchMovies(DOM.searchInput.value);
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.activeElement === DOM.searchInput) {
          clearTimeout(STATE.debounceTimer);
          searchMovies(DOM.searchInput.value);
        }
        if (e.key === 'Escape') {
          DOM.searchInput.value = '';
          clearResults();
          DOM.emptyState.classList.add('active');
          STATE.currentQuery = '';
        }
      });

      // Filter buttons
      DOM.filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          DOM.filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          STATE.selectedType = btn.dataset.type;
          
          // Re-apply filter to current results
          if (STATE.results.length > 0) {
            displayResults(filterResults(STATE.results));
          }
        });
      });

      // Theme toggle
      DOM.themeToggle.addEventListener('click', toggleTheme);

      // Focus search input on page load
      DOM.searchInput.focus();
    }

    // ========== INITIALIZATION ==========
    function init() {
      initTheme();
      setupEventListeners();
      loadRecentlyWatched();
      showEmptyState();
    }

    function showEmptyState() {
      DOM.emptyState.innerHTML = '<p><i class="fas fa-search"></i> Start typing to search for movies and TV shows</p>';
      DOM.emptyState.classList.add('active');
    }

    // Start on DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
